services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    env_file:
      - .env
    expose:
      - "7070"

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    ports:
      - "6030:6030"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  uploads_data:
